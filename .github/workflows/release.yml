name: Build & Release App

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch: # Allows manual runs from the Actions tab

jobs:
  # ===========================================================================
  # Job: Get/Increment Version Tag
  # ===========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version tag
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "Triggered by tag: ${{ github.ref_name }}"
          else
            # Fetch tags, ignoring errors if offline or no remote
            git fetch --tags --force || true
            latest_tag=$(git tag -l "v1.*" | sort -V | tail -n1)
            
            if [ -z "$latest_tag" ]; then
              next_version="v1.0.0"
            else
              IFS='.' read -r major minor patch <<< "${latest_tag#v}"
              next_patch=$((patch + 1))
              next_version="v1.0.${next_patch}"
            fi
            
            echo "version=${next_version}" >> $GITHUB_OUTPUT
            echo "Calculated next version: ${next_version}"
          fi

  # ===========================================================================
  # Job: Build for macOS
  # ===========================================================================
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.23"
          cache: ${{ !env.ACT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ !env.ACT && 'npm' || '' }}
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: |
          if command -v wails3 >/dev/null 2>&1; then
            echo "wails3 is already installed, skipping installation."
          else
            export GOMAXPROCS=1
            go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          fi

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          if [ -d node_modules ]; then
            echo "node_modules already exists, skipping npm ci."
          else
            npm ci
          fi

      - name: Build and Package App Bundle
        run: |
          # Package creates the .app bundle structure in bin/
          wails3 task package

      - name: Archive macOS App Bundle
        run: |
          cd bin
          zip -r act-wails-macos-universal.zip act-wails.app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifact
          path: bin/act-wails-macos-universal.zip

      - name: Send Telegram Notification
        run: |
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_TO }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "text=✅ macOS build succeeded for version ${{ needs.prepare.outputs.version }}!"
          else
            echo "Telegram secrets not configured, skipping notification."
          fi

  # ===========================================================================
  # Job: Build for Windows
  # ===========================================================================
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.23"
          cache: ${{ !env.ACT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ !env.ACT && 'npm' || '' }}
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        shell: bash
        run: |
          if command -v wails3 >/dev/null 2>&1; then
            echo "wails3 is already installed, skipping installation."
          else
            export GOMAXPROCS=1
            go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          fi

      - name: Install Frontend Dependencies
        shell: bash
        run: |
          cd frontend
          if [ -d node_modules ]; then
            echo "node_modules already exists, skipping npm ci."
          else
            npm ci
          fi

      - name: Build Application Binary
        run: |
          wails3 task windows:build

      - name: Build NSIS Installer
        shell: bash
        run: |
          if command -v makensis >/dev/null 2>&1; then
            wails3 task package
          else
            echo "makensis not found, skipping installer build."
          fi

      - name: List Output Files
        shell: bash
        run: |
          echo "=== bin/ content ==="
          ls -la bin/ || true
          echo "=== build/windows/nsis/ content ==="
          ls -la build/windows/nsis/ || true

      - name: Prepare Windows Release Artifacts
        shell: bash
        run: |
          mkdir -p win-release
          # Copy raw executable
          if [ -f bin/act-wails.exe ]; then
            cp bin/act-wails.exe win-release/act-wails.exe
          fi
          # Copy NSIS installer
          if [ -f build/windows/nsis/act-wails-installer.exe ]; then
            cp build/windows/nsis/act-wails-installer.exe win-release/act-wails-installer.exe
          fi

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: win-release/*

      - name: Send Telegram Notification
        shell: bash
        run: |
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_TO }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "text=✅ Windows build succeeded for version ${{ needs.prepare.outputs.version }}!"
          else
            echo "Telegram secrets not configured, skipping notification."
          fi

  # ===========================================================================
  # Job: Build for Linux
  # ===========================================================================
  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install GTK4 and WebKitGTK 6.0 Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev build-essential pkg-config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ">=1.23"
          cache: ${{ !env.ACT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ !env.ACT && 'npm' || '' }}
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        run: |
          if command -v wails3 >/dev/null 2>&1; then
            echo "wails3 is already installed, skipping installation."
          else
            export GOMAXPROCS=1
            go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          fi

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          if [ -d node_modules ]; then
            echo "node_modules already exists, skipping npm ci."
          else
            npm ci
          fi

      - name: Build Linux Binary
        run: |
          export GOMAXPROCS=1
          wails3 build

      - name: Generate DEB and RPM Packages
        run: |
          # Use internal nfpm tool inside Wails v3 to build deb/rpm packages
          wails3 task linux:generate:deb
          wails3 task linux:generate:rpm

      - name: Compress Linux Binary
        run: |
          cd bin
          tar -czvf act-wails-linux-amd64.tar.gz act-wails

      - name: Prepare Linux Release Artifacts
        run: |
          mkdir -p linux-release
          # Copy tarball
          cp bin/act-wails-linux-amd64.tar.gz linux-release/
          # Copy DEB package (handle wildcards or exact names)
          cp bin/*.deb linux-release/ || true
          # Copy RPM package
          cp bin/*.rpm linux-release/ || true

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: linux-release/*

      - name: Send Telegram Notification
        run: |
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_TO }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "text=✅ Linux build succeeded for version ${{ needs.prepare.outputs.version }}!"
          else
            echo "Telegram secrets not configured, skipping notification."
          fi

  # ===========================================================================
  # Job: Create Draft Release and Upload All Assets
  # ===========================================================================
  release:
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: allows the action to write and create releases
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Work Directory for Assets
        run: mkdir -p release-assets

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-artifact
          path: release-assets/

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact
          path: release-assets/

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact
          path: release-assets/

      - name: List Downloaded Release Assets
        run: |
          echo "=== Compiled Release Assets ==="
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: Release ${{ needs.prepare.outputs.version }}
          tag_name: ${{ needs.prepare.outputs.version }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Final Telegram Notification
        run: |
          if [ -n "${{ secrets.TELEGRAM_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_TO }}" ]; then
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
              -d "text=🎉 All platforms have been built and Release ${{ needs.prepare.outputs.version }} has been created successfully! 🚀"
          else
            echo "Telegram secrets not configured, skipping notification."
          fi
